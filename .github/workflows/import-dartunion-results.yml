name: Import dartunion.de match data

# Runs every Monday at 06:00 UTC so the data is fresh for the week.
# Can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON file

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run import script
        run: npm run import:dartunion

      - name: Commit updated match data (if changed)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add lib/data/imported-matches.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update imported match data from dartunion.de [skip ci]"

      - name: Push
        run: git push
